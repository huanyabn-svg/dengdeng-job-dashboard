name: Daily refresh and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * *"
      timezone: "Asia/Shanghai"

concurrency:
  group: applypilot-pages
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Refresh public job data
        if: github.event_name != 'push'
        run: node scripts/refresh.mjs

      - name: Validate public package
        run: node scripts/check.mjs

      - name: Commit refreshed data
        if: github.event_name != 'push'
        run: |
          git config user.name "applypilot-bot"
          git config user.email "applypilot-bot@users.noreply.github.com"
          git add data/jobs.js data/run-status.js
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily job refresh"
            git push
          fi

      - name: Prepare static site
        run: |
          mkdir -p _site/data
          cp index.html _site/index.html
          cp data/jobs.js data/run-status.js _site/data/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
