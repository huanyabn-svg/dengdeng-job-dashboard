<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="每天自动更新的公开招聘信息看板，聚合企业官网与 Bonjour 上海/远程岗位。">
  <title>邓邓的自动招聘看板</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f5f2;
      --panel: #ffffff;
      --text: #171717;
      --muted: #686868;
      --border: #deded8;
      --primary: #171717;
      --primary-text: #ffffff;
      --soft: #efefe9;
      --mint: #dff7ea;
      --blue: #e4f0ff;
      --amber: #fff0c7;
      --violet: #eee7ff;
      --pink: #ffe4ef;
      --ring: #4d7cff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #181818;
        --panel: #222222;
        --text: #f1f1ef;
        --muted: #b2b2ad;
        --border: #3b3b38;
        --primary: #f1f1ef;
        --primary-text: #181818;
        --soft: #2d2d2a;
        --mint: #183b2a;
        --blue: #1d3149;
        --amber: #453718;
        --violet: #30254d;
        --pink: #492536;
        --ring: #88a6ff;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    button, input { font: inherit; }
    button, a { -webkit-tap-highlight-color: transparent; }
    a { color: inherit; }
    .app { width: min(1440px, 100%); margin: 0 auto; padding: 20px; }
    .topbar { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 16px; align-items: center; margin-bottom: 16px; }
    .brand { display: flex; gap: 10px; align-items: center; min-width: 0; }
    .mark { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 50%; background: var(--primary); color: var(--primary-text); font-weight: 700; }
    .brand strong, .brand span { display: block; }
    .brand span, .muted { color: var(--muted); }
    .metrics { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .badge, .tag { display: inline-flex; align-items: center; border-radius: 999px; background: var(--soft); padding: 3px 9px; white-space: nowrap; }
    .badge.live::before { content: ""; width: 7px; height: 7px; margin-right: 6px; border-radius: 50%; background: #35a66f; }
    .layout { display: grid; grid-template-columns: 170px minmax(0, 1fr) 290px; gap: 14px; align-items: start; }
    .panel, .job { border: 1px solid var(--border); border-radius: 16px; background: var(--panel); }
    .sidebar, .detail { position: sticky; top: 14px; padding: 14px; }
    h1, h2, h3, p { margin-top: 0; }
    h2, h3 { margin-bottom: 8px; font-weight: 650; }
    .filter-group + .filter-group { margin-top: 16px; }
    .filter-label { display: block; color: var(--muted); margin-bottom: 6px; }
    .filter-stack { display: grid; gap: 5px; }
    .btn { display: inline-flex; justify-content: center; align-items: center; min-height: 36px; padding: 7px 11px; border: 1px solid var(--border); border-radius: 10px; background: transparent; color: var(--text); text-decoration: none; cursor: pointer; }
    .btn:disabled { cursor: wait; opacity: .65; }
    .filter-stack .btn { justify-content: flex-start; width: 100%; }
    .btn[aria-pressed="true"], .btn.primary { background: var(--primary); color: var(--primary-text); border-color: var(--primary); }
    .btn:focus-visible, input:focus-visible, .job:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }
    .reset { width: 100%; margin-top: 16px; }
    .main { min-width: 0; }
    .search-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: end; margin-bottom: 10px; }
    label { color: var(--muted); }
    input { display: block; width: 100%; min-height: 40px; margin-top: 5px; border: 1px solid var(--border); border-radius: 10px; background: var(--panel); color: var(--text); padding: 8px 11px; }
    .count { color: var(--muted); padding-bottom: 9px; white-space: nowrap; }
    .active-filters { display: flex; flex-wrap: wrap; gap: 6px; min-height: 30px; margin-bottom: 8px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; }
    .job { display: grid; gap: 8px; padding: 13px; cursor: pointer; text-align: left; color: var(--text); }
    .job[data-tone="mint"] { background: linear-gradient(135deg, var(--mint), var(--panel)); }
    .job[data-tone="blue"] { background: linear-gradient(135deg, var(--blue), var(--panel)); }
    .job[data-tone="amber"] { background: linear-gradient(135deg, var(--amber), var(--panel)); }
    .job[data-tone="violet"] { background: linear-gradient(135deg, var(--violet), var(--panel)); }
    .job[data-tone="pink"] { background: linear-gradient(135deg, var(--pink), var(--panel)); }
    .job.selected { outline: 2px solid var(--ring); outline-offset: 1px; }
    .job-head, .job-foot { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; }
    .job h3 { margin: 2px 0 0; overflow-wrap: anywhere; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag { font-size: 12px; }
    .job-foot { align-items: center; color: var(--muted); }
    .actions { display: flex; gap: 6px; }
    .detail-company { color: var(--muted); margin-bottom: 10px; }
    .detail-list { display: grid; gap: 12px; margin: 16px 0; }
    .detail-list span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 3px; }
    .detail-actions { display: grid; gap: 7px; }
    .queue-section { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
    .advisor { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
    .advisor input[type="file"] { padding: 7px; }
    .advisor-status { color: var(--muted); margin: 8px 0; font-size: 12px; }
    .advice-list { display: grid; gap: 7px; margin-top: 10px; }
    .advice-item { border: 1px solid var(--border); border-radius: 10px; padding: 9px; background: var(--soft); }
    .advice-item strong, .advice-item span { display: block; }
    .advice-item span { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .queue-heading { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .queue-list { display: grid; gap: 7px; margin: 10px 0; }
    .queue-item { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; }
    .queue-item strong, .queue-item span { display: block; overflow-wrap: anywhere; }
    .queue-item span { color: var(--muted); font-size: 12px; }
    .queue-empty { color: var(--muted); padding: 6px 0; }
    .empty { grid-column: 1 / -1; color: var(--muted); text-align: center; padding: 34px 0; }
    footer { color: var(--muted); text-align: center; padding: 18px 0 4px; }
    @media (max-width: 1000px) {
      .layout { grid-template-columns: 160px minmax(0, 1fr); }
      .detail { position: static; grid-column: 1 / -1; }
    }
    @media (max-width: 680px) {
      .app { padding: 12px; }
      .topbar, .layout, .search-row { grid-template-columns: 1fr; }
      .metrics { justify-content: flex-start; }
      .sidebar { position: static; }
      .filter-stack { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid { grid-template-columns: 1fr; }
      .count { padding-bottom: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">AP</div>
        <div><strong>邓邓的自动招聘看板</strong><span>每日搜索 · 链接校验 · 上海 / 远程 Bonjour · 企业官网</span></div>
      </div>
      <div class="metrics" aria-label="数据摘要">
        <span class="badge" id="totalMetric">0 条岗位</span>
        <span class="badge" id="bonjourMetric">0 条 Bonjour</span>
        <span class="badge" id="officialMetric">0 个官网入口</span>
        <span class="badge" id="queueMetric">投递队列 0</span>
        <span class="badge live" id="refreshMetric">等待刷新</span>
        <button class="btn primary" id="refreshButton" type="button">立即搜索最新岗位</button>
        <button class="btn" id="syncButton" type="button">同步已发布数据</button>
        <a class="btn" id="runSearchLink" href="#" target="_blank" rel="noopener noreferrer" hidden>打开更新进度</a>
      </div>
    </header>

    <div class="layout">
      <aside class="panel sidebar" aria-label="岗位筛选">
        <h2>筛选条件</h2>
        <div class="filter-group">
          <span class="filter-label">地点</span>
          <div class="filter-stack">
            <button class="btn" data-filter="location" data-value="all" aria-pressed="true">全部地点</button>
            <button class="btn" data-filter="location" data-value="base" aria-pressed="false">目标城市</button>
            <button class="btn" data-filter="location" data-value="overseas" aria-pressed="false">海外 / 远程</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">方向</span>
          <div class="filter-stack">
            <button class="btn" data-filter="role" data-value="all" aria-pressed="true">全部方向</button>
            <button class="btn" data-filter="role" data-value="operations" aria-pressed="false">运营 / 内容</button>
            <button class="btn" data-filter="role" data-value="sales" aria-pressed="false">销售 / BD</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">进度</span>
          <div class="filter-stack">
            <button class="btn" data-filter="status" data-value="bonjour" aria-pressed="true">Bonjour 在招</button>
            <button class="btn" data-filter="status" data-value="watch" aria-pressed="false">官网岗位搜索</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">企业性质</span>
          <div class="filter-stack">
            <button class="btn" data-filter="ownership" data-value="all" aria-pressed="true">全部性质</button>
            <button class="btn" data-filter="ownership" data-value="private" aria-pressed="false">民营企业</button>
            <button class="btn" data-filter="ownership" data-value="foreign" aria-pressed="false">外资 / 跨国</button>
            <button class="btn" data-filter="ownership" data-value="state" aria-pressed="false">国企 / 央企</button>
            <button class="btn" data-filter="ownership" data-value="startup" aria-pressed="false">AI 初创 / 成长</button>
          </div>
        </div>
        <button class="btn reset" id="resetButton">恢复默认</button>
      </aside>

      <main class="main">
        <div class="search-row">
          <label>搜索公司或岗位
            <input id="searchInput" type="search" placeholder="例如：上海、海外增长、销售">
          </label>
          <span class="count" id="resultCount">0 条招聘信息</span>
        </div>
        <div class="active-filters" id="activeFilters" aria-live="polite"></div>
        <section class="grid" id="jobGrid" aria-label="岗位列表"></section>
      </main>

      <aside class="panel detail" aria-live="polite">
        <span class="badge" id="detailStatus">请选择岗位</span>
        <h2 id="detailTitle">岗位详情</h2>
        <div class="detail-company" id="detailCompany"></div>
        <div class="tags" id="detailTags"></div>
        <div class="detail-list">
          <div><span>匹配判断</span><div id="detailReason">选择左侧岗位后查看。</div></div>
          <div><span>下一步</span><div id="detailNext">—</div></div>
          <div><span>入口说明</span><div id="detailLinkType">—</div></div>
          <div><span>链接状态</span><div id="detailLinkState">—</div></div>
        </div>
        <div class="detail-actions">
          <a class="btn primary" id="applyLink" href="#" target="_blank" rel="noopener noreferrer">打开招聘入口</a>
          <button class="btn" id="queueButton" type="button" aria-pressed="false">加入私有投递队列</button>
          <button class="btn" id="copyLink">复制岗位链接</button>
        </div>
        <section class="advisor" aria-label="本地简历岗位类型建议">
          <h3>简历适合投什么</h3>
          <div class="muted">上传 PDF 后只在当前浏览器本地分析，不保存、不上传。</div>
          <input id="resumeInput" type="file" accept=".pdf,.txt,.md,application/pdf,text/plain" aria-label="上传简历获取岗位类型建议">
          <div class="advisor-status" id="resumeStatus">尚未选择简历</div>
          <div class="advice-list" id="resumeAdvice" aria-live="polite"></div>
        </section>
        <section class="queue-section" aria-label="私有投递队列">
          <div class="queue-heading"><h3>私有投递队列</h3><span class="badge" id="queueCount">0 条</span></div>
          <div class="muted">仅保存在当前浏览器，不上传个人资料。</div>
          <div class="queue-list" id="queueList" aria-live="polite"></div>
          <div class="detail-actions">
            <button class="btn primary" id="exportQueue" type="button" hidden>导出给私有投递助手</button>
            <button class="btn" id="clearQueue" type="button" hidden>清空队列</button>
          </div>
        </section>
      </aside>
    </div>
    <footer id="runMessage">公开看板不包含姓名、电话、邮箱、简历或申请记录。</footer>
  </div>

  <script src="./data/jobs.js"></script>
  <script src="./data/run-status.js"></script>
  <script>
    (() => {
      const isPublicRecord = job => job.active !== false && (job.recordKind === 'search' || job.verificationState === 'confirmed');
      let jobs = (window.APPLYPILOT_JOBS || []).filter(isPublicRecord);
      let run = window.APPLYPILOT_RUN_STATUS || {};
      const labels = {
        all: '全部', base: '目标城市', overseas: '海外 / 远程',
        operations: '运营 / 内容', sales: '销售 / BD',
        bonjour: 'Bonjour 在招', watch: '官网岗位搜索',
        private: '民营企业', foreign: '外资 / 跨国', state: '国企 / 央企', startup: 'AI 初创 / 成长公司'
      };
      const tones = ['mint', 'blue', 'amber', 'violet', 'pink'];
      const state = { location: 'all', role: 'all', status: 'bonjour', ownership: 'all', query: '', selected: null };
      const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, character => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[character]);
      const grid = document.getElementById('jobGrid');
      const count = document.getElementById('resultCount');
      const activeFilters = document.getElementById('activeFilters');
      const search = document.getElementById('searchInput');
      const refreshButton = document.getElementById('refreshButton');
      const syncButton = document.getElementById('syncButton');
      const runSearchLink = document.getElementById('runSearchLink');
      const queueButton = document.getElementById('queueButton');
      const queueList = document.getElementById('queueList');
      const clearQueue = document.getElementById('clearQueue');
      const exportQueue = document.getElementById('exportQueue');
      const queueStorageKey = 'dengdeng-private-application-queue-v1';
      let queue = [];
      let workflowUrl = '';
      let refreshPoll = null;

      try {
        const storedQueue = JSON.parse(localStorage.getItem(queueStorageKey) || '[]');
        if (Array.isArray(storedQueue)) queue = storedQueue.filter(item => item && item.id && item.sourceUrl);
      } catch (_) {
        queue = [];
      }

      function saveQueue() {
        try { localStorage.setItem(queueStorageKey, JSON.stringify(queue)); }
        catch (_) { /* 浏览器禁用本地存储时，本次会话仍可使用队列。 */ }
      }

      function renderQueue() {
        document.getElementById('queueMetric').textContent = `投递队列 ${queue.length}`;
        document.getElementById('queueCount').textContent = `${queue.length} 条`;
        clearQueue.hidden = queue.length === 0;
        exportQueue.hidden = queue.length === 0;
        queueList.innerHTML = queue.length ? queue.map(item => `
          <div class="queue-item">
            <div><strong>${escapeHtml(item.company)}</strong><span>${escapeHtml(item.title)} · ${escapeHtml(item.resumeVariant)}</span></div>
            <button class="btn" type="button" data-queue-remove="${escapeHtml(item.id)}">移除</button>
          </div>`).join('') : '<div class="queue-empty">尚未加入岗位</div>';
        queueList.querySelectorAll('[data-queue-remove]').forEach(button => button.addEventListener('click', () => {
          queue = queue.filter(item => item.id !== button.dataset.queueRemove);
          saveQueue();
          renderQueue();
          updateQueueButton();
        }));
      }

      function updateQueueButton() {
        const queued = Boolean(state.selected && queue.some(item => item.id === state.selected));
        queueButton.setAttribute('aria-pressed', String(queued));
        queueButton.textContent = queued ? '已加入投递队列' : '加入私有投递队列';
        queueButton.disabled = !state.selected;
      }

      function updateMetrics() {
        const confirmedJobs = jobs.filter(job => job.recordKind === 'job').length;
        const searchEntries = jobs.filter(job => job.recordKind === 'search').length;
        document.getElementById('totalMetric').textContent = `${confirmedJobs} 条已核验岗位`;
        document.getElementById('bonjourMetric').textContent = `${jobs.filter(j => j.status === 'bonjour').length} 条 Bonjour`;
        document.getElementById('officialMetric').textContent = `${searchEntries} 个官网入口`;
        const refreshed = run.lastRun ? new Date(run.lastRun) : null;
        document.getElementById('refreshMetric').textContent = refreshed && !Number.isNaN(refreshed.getTime())
          ? `更新 ${refreshed.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}`
          : '等待自动刷新';
        if (run.message) document.getElementById('runMessage').textContent = `${run.message} · 公开看板不包含个人资料。`;
      }

      function configureWorkflowLink() {
        if (!location.hostname.endsWith('.github.io')) return;
        const owner = location.hostname.slice(0, -'.github.io'.length);
        const repository = location.pathname.split('/').filter(Boolean)[0] || `${owner}.github.io`;
        workflowUrl = `https://github.com/${encodeURIComponent(owner)}/${encodeURIComponent(repository)}/actions/workflows/daily-refresh.yml`;
        runSearchLink.href = workflowUrl;
        runSearchLink.hidden = false;
      }

      function loadScript(source) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = source;
          script.onload = () => { script.remove(); resolve(); };
          script.onerror = () => { script.remove(); reject(new Error(`无法加载 ${source}`)); };
          document.head.appendChild(script);
        });
      }

      async function syncLatestData({ quiet = false } = {}) {
        if (location.protocol === 'file:') {
          location.reload();
          return false;
        }
        if (!quiet) {
          syncButton.disabled = true;
          syncButton.textContent = '同步中…';
        }
        try {
          const previousRun = run.lastRun || '';
          const stamp = Date.now();
          await loadScript(`./data/jobs.js?v=${stamp}`);
          await loadScript(`./data/run-status.js?v=${stamp}`);
          jobs = (window.APPLYPILOT_JOBS || []).filter(isPublicRecord);
          run = window.APPLYPILOT_RUN_STATUS || {};
          updateMetrics();
          render();
          const changed = Boolean(run.lastRun && run.lastRun !== previousRun);
          if (!quiet) syncButton.textContent = changed ? '发现新数据' : '已是最新发布版';
          return changed;
        } catch (error) {
          if (!quiet) syncButton.textContent = '同步失败';
          document.getElementById('runMessage').textContent = `刷新失败：${error.message}`;
          return false;
        } finally {
          if (!quiet) setTimeout(() => { syncButton.disabled = false; syncButton.textContent = '同步已发布数据'; }, 1500);
        }
      }

      function startLiveRefresh() {
        if (!workflowUrl) {
          document.getElementById('runMessage').textContent = '本地文件不能启动云端搜索；请使用 GitHub Pages 公开网址。';
          return;
        }
        window.open(workflowUrl, '_blank', 'noopener,noreferrer');
        refreshButton.disabled = true;
        refreshButton.textContent = '等待 GitHub 更新…';
        document.getElementById('runMessage').textContent = '已打开 GitHub 更新页：点击 Run workflow。看板将在后台每 15 秒检查一次新结果。';
        const startedAt = Date.now();
        clearInterval(refreshPoll);
        refreshPoll = setInterval(async () => {
          const changed = await syncLatestData({ quiet:true });
          if (changed || Date.now() - startedAt > 5 * 60 * 1000) {
            clearInterval(refreshPoll);
            refreshPoll = null;
            refreshButton.disabled = false;
            refreshButton.textContent = changed ? '更新完成' : '立即搜索最新岗位';
            if (changed) document.getElementById('runMessage').textContent = `${run.message || '实时岗位搜索已完成。'} · 数据已同步到看板。`;
            setTimeout(() => { refreshButton.textContent = '立即搜索最新岗位'; }, 2200);
          }
        }, 15000);
      }

      const adviceProfiles = [
        { label: '海外内容运营 / 社媒运营', words: ['内容运营', '内容创作', '社交媒体', '社媒', '小红书', '公众号', '海外', '英文', '英语', '文案', '编辑'] },
        { label: '产品运营 / 用户运营', words: ['产品运营', '用户运营', '用户增长', '用户反馈', '留存', '活跃', '社群', '数据分析', '产品优化'] },
        { label: '市场营销 / 品牌增长', words: ['市场营销', '品牌', '营销', '增长', '活动策划', '推广', '传播', '投放', 'campaign'] },
        { label: '销售 / BD / GTM', words: ['销售', '商务拓展', '业务拓展', 'bd', 'gtm', '客户开发', '合作拓展', '转化率', '谈判'] },
        { label: '客户成功 / 大客户运营', words: ['客户成功', '大客户', '客户关系', '客户服务', '需求分析', '续约', '交付', '解决方案'] },
        { label: '商业运营 / 项目运营', words: ['商业运营', '项目运营', '项目管理', '跨部门', '流程优化', '策略', '商业分析', '资源协调'] },
        { label: '国企宣传 / 国际业务运营', words: ['国企', '央企', '宣传', '国际业务', '国际传播', '英语', '英文', '海外市场'] },
        { label: '零售 / 电商运营', words: ['零售', '电商', '店铺运营', '商品运营', '平台运营', '供应链', 'gmv', '转化'] }
      ];

      async function extractResumeText(file) {
        if (!file) return '';
        if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
          const pdfjs = await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs');
          pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs';
          const pdf = await pdfjs.getDocument({ data: await file.arrayBuffer() }).promise;
          const pages = [];
          for (let pageNumber = 1; pageNumber <= Math.min(pdf.numPages, 12); pageNumber += 1) {
            const page = await pdf.getPage(pageNumber);
            const content = await page.getTextContent();
            pages.push(content.items.map(item => item.str || '').join(' '));
          }
          return pages.join('\n');
        }
        return file.text();
      }

      async function analyseResume(file) {
        const status = document.getElementById('resumeStatus');
        const output = document.getElementById('resumeAdvice');
        output.innerHTML = '';
        if (!file) {
          status.textContent = '尚未选择简历';
          return;
        }
        status.textContent = `正在本地分析 ${file.name}…`;
        try {
          const text = (await extractResumeText(file)).toLowerCase().replace(/\s+/g, ' ');
          if (text.trim().length < 40) throw new Error('没有读取到足够的可复制文字');
          const ranked = adviceProfiles.map(profile => {
            const hits = profile.words.filter(word => text.includes(word.toLowerCase()));
            return { ...profile, hits, score: hits.length };
          }).sort((a, b) => b.score - a.score || a.label.localeCompare(b.label, 'zh-CN'));
          const selected = ranked.filter(item => item.score > 0).slice(0, 5);
          const fallback = adviceProfiles.slice(0, 4).map(item => ({ ...item, hits: [] }));
          const advice = selected.length ? selected : fallback;
          output.innerHTML = advice.map((item, index) => `<div class="advice-item"><strong>${index + 1}. ${escapeHtml(item.label)}</strong>${item.hits.length ? `<span>简历线索：${escapeHtml(item.hits.slice(0, 4).join('、'))}</span>` : ''}</div>`).join('');
          status.textContent = `已在本地分析完成，列出 ${advice.length} 个适合方向；文件和文字均未上传。`;
        } catch (error) {
          status.textContent = `无法分析：${error.message}。请尝试可复制文字的 PDF、TXT 或 MD 文件。`;
        }
      }

      function visibleJobs() {
        const q = state.query.trim().toLowerCase();
        return jobs.filter(job =>
          job.status === state.status &&
          (state.location === 'all' || job.zone === state.location) &&
          (state.role === 'all' || job.role === state.role) &&
          (state.ownership === 'all' || job.ownership === state.ownership) &&
          (!q || `${job.company} ${job.title} ${job.family} ${job.location} ${labels[job.ownership] || ''}`.toLowerCase().includes(q))
        );
      }

      function selectJob(id) {
        const job = jobs.find(item => item.id === id);
        if (!job) return;
        state.selected = id;
        document.querySelectorAll('.job').forEach(card => card.classList.toggle('selected', card.dataset.id === id));
        document.getElementById('detailStatus').textContent = job.statusLabel;
        document.getElementById('detailTitle').textContent = job.title;
        document.getElementById('detailCompany').textContent = `${job.company} · ${job.location}`;
        document.getElementById('detailTags').innerHTML = `<span class="tag">${escapeHtml(job.family)}</span><span class="tag">${escapeHtml(labels[job.ownership] || job.ownership)}</span><span class="tag">优先级 ${escapeHtml(job.priority)}</span>`;
        document.getElementById('detailReason').textContent = job.reason || '符合当前岗位方向和地点筛选。';
        document.getElementById('detailNext').textContent = job.next || '打开入口并核验岗位要求。';
        document.getElementById('detailLinkType').textContent = job.linkType || '公开招聘入口';
        const checked = job.lastChecked ? new Date(job.lastChecked).toLocaleDateString('zh-CN', { timeZone: 'Asia/Shanghai' }) : '未记录';
        document.getElementById('detailLinkState').textContent = job.recordKind === 'search'
          ? `仅核验为官网搜索入口，不代表存在某个具体岗位 · 检测 ${checked}`
          : `职位详情已核验 · ${job.verificationEvidence || job.linkState || '官网仍可访问'} · 检测 ${checked}`;
        const link = document.getElementById('applyLink');
        link.href = job.sourceUrl;
        link.textContent = job.applyLabel || '打开招聘入口';
        updateQueueButton();
      }

      function render() {
        const visible = visibleJobs();
        count.textContent = `${visible.length} 条招聘信息`;
        activeFilters.innerHTML = [state.location, state.role, state.status, state.ownership]
          .filter(value => value !== 'all')
          .map(value => `<span class="badge">${escapeHtml(labels[value])}</span>`).join('');
        grid.innerHTML = visible.length ? visible.map((job, index) => `
          <article class="job${job.id === state.selected ? ' selected' : ''}" data-id="${escapeHtml(job.id)}" data-tone="${tones[index % tones.length]}">
            <div class="job-head">
              <div><div class="muted">${escapeHtml(job.location)} · ${job.lastChecked ? new Date(job.lastChecked).toLocaleDateString('zh-CN') : ''}</div><h3>${escapeHtml(job.company)}</h3></div>
              <span class="badge">${escapeHtml(job.statusLabel)}</span>
            </div>
            <div>${escapeHtml(job.title)}</div>
            <div class="tags"><span class="tag">${escapeHtml(job.family)}</span><span class="tag">${escapeHtml(labels[job.ownership] || job.ownership)}</span><span class="tag">${job.recordKind === 'search' ? '仅官网搜索入口' : '职位详情已核验'}</span></div>
            <div class="job-foot"><span>优先级 ${escapeHtml(job.priority)}</span><div class="actions"><button class="btn" data-detail="${escapeHtml(job.id)}">详情</button><a class="btn" href="${escapeHtml(job.sourceUrl)}" target="_blank" rel="noopener noreferrer">打开</a></div></div>
          </article>`).join('') : '<div class="empty">没有符合当前筛选的岗位</div>';
        grid.querySelectorAll('.job').forEach(card => card.addEventListener('click', () => selectJob(card.dataset.id)));
        grid.querySelectorAll('[data-detail]').forEach(button => button.addEventListener('click', event => { event.stopPropagation(); selectJob(button.dataset.detail); }));
        grid.querySelectorAll('a').forEach(link => link.addEventListener('click', event => event.stopPropagation()));
        if (!visible.some(job => job.id === state.selected) && visible[0]) selectJob(visible[0].id);
      }

      document.querySelectorAll('[data-filter]').forEach(button => button.addEventListener('click', () => {
        const key = button.dataset.filter;
        state[key] = button.dataset.value;
        document.querySelectorAll(`[data-filter="${key}"]`).forEach(peer => peer.setAttribute('aria-pressed', String(peer === button)));
        render();
      }));
      search.addEventListener('input', () => { state.query = search.value; render(); });
      document.getElementById('resetButton').addEventListener('click', () => {
        Object.assign(state, { location: 'all', role: 'all', status: 'bonjour', ownership: 'all', query: '' });
        search.value = '';
        document.querySelectorAll('[data-filter]').forEach(button => {
          const pressed = (button.dataset.filter === 'status' && button.dataset.value === 'bonjour') || (button.dataset.filter !== 'status' && button.dataset.value === 'all');
          button.setAttribute('aria-pressed', String(pressed));
        });
        render();
      });
      document.getElementById('copyLink').addEventListener('click', async event => {
        const job = jobs.find(item => item.id === state.selected);
        if (!job) return;
        try { await navigator.clipboard.writeText(job.sourceUrl); event.currentTarget.textContent = '已复制'; }
        catch (_) { window.prompt('复制岗位链接：', job.sourceUrl); }
        setTimeout(() => { event.currentTarget.textContent = '复制岗位链接'; }, 1500);
      });
      queueButton.addEventListener('click', () => {
        const job = jobs.find(item => item.id === state.selected);
        if (!job) return;
        if (queue.some(item => item.id === job.id)) {
          queue = queue.filter(item => item.id !== job.id);
        } else {
          queue.push({
            id: job.id,
            company: job.company,
            title: job.title,
            location: job.location,
            sourceUrl: job.sourceUrl,
            resumeVariant: job.role === 'sales' ? '销售 / BD / GTM版' : '内容 / 运营 / 营销版',
            addedAt: new Date().toISOString()
          });
        }
        saveQueue();
        renderQueue();
        updateQueueButton();
      });
      clearQueue.addEventListener('click', () => {
        queue = [];
        saveQueue();
        renderQueue();
        updateQueueButton();
      });
      exportQueue.addEventListener('click', () => {
        if (!queue.length) return;
        const payload = {
          format: 'dengdeng-applypilot-queue',
          version: 1,
          exportedAt: new Date().toISOString(),
          privacy: '岗位信息，不含姓名、电话、邮箱或简历文件',
          jobs: queue
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `dengdeng-application-queue-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        exportQueue.textContent = '队列已导出';
        setTimeout(() => { exportQueue.textContent = '导出给私有投递助手'; }, 1800);
      });
      document.getElementById('resumeInput').addEventListener('change', event => analyseResume(event.target.files && event.target.files[0]));
      refreshButton.addEventListener('click', startLiveRefresh);
      syncButton.addEventListener('click', () => syncLatestData());
      configureWorkflowLink();
      updateMetrics();
      renderQueue();
      render();
    })();
  </script>
</body>
</html>
